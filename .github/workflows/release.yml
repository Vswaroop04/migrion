name: Release & Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Test
        run: go test ./internal/... ./cmd/...

      - name: Build binaries
        run: make build-all

      # Check if migratex version already exists on npm
      - name: Check migratex version
        id: migratex_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "migratex@$VERSION" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi


      - name: Create GitHub Release
        if: steps.migratex_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.migratex_check.outputs.version }}" \
            --title "v${{ steps.migratex_check.outputs.version }}" \
            --generate-notes \
            bin/migratex-darwin-arm64 \
            bin/migratex-darwin-amd64 \
            bin/migratex-linux-amd64 \
            bin/migratex-linux-arm64 \
            bin/migratex-windows-amd64.exe

      - name: Publish migratex
        if: steps.migratex_check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
